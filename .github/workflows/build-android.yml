name: Build Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android signing credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          node -e "
            const fs = require('fs');
            const ks = Buffer.from(process.env.KEYSTORE_BASE64.trim(), 'base64');
            fs.writeFileSync('android-keystore.jks', ks);
            console.log('Keystore written:', ks.length, 'bytes');
            const creds = {
              android: {
                keystore: {
                  keystorePath: './android-keystore.jks',
                  keystorePassword: process.env.KEYSTORE_PASSWORD,
                  keyAlias: process.env.KEY_ALIAS,
                  keyPassword: process.env.KEY_PASSWORD
                }
              }
            };
            fs.writeFileSync('credentials.json', JSON.stringify(creds, null, 2));
            console.log('credentials.json written');
          "

      - name: Build Android AAB
        run: EAS_NO_VCS=1 eas build --local --platform android --profile production-new --output ${{ github.workspace }}/cfb-social.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfb-social-android
          path: cfb-social.aab
